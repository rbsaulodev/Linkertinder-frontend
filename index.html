<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Linketinder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<nav>
  <div class="logo">Linke<span>tinder</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-page="candidatos">Candidatos</button>
    <button class="nav-tab" data-page="empresas">Empresas</button>
    <button class="nav-tab" data-page="perfil-empresa">Perfil Empresa</button>
  </div>
</nav>

<div class="page active" id="page-candidatos">
  <div class="page-header">
    <div>
      <h1>Candidatos</h1>
      <h2>Perfis cadastrados <span id="count-cand" class="count-badge">0</span></h2>
    </div>
    <button class="btn-add" id="btn-add-candidato">+ Novo Candidato</button>
  </div>
  <div class="cards-grid" id="grid-candidatos"></div>
</div>

<div class="page" id="page-empresas">
  <div class="page-header">
    <div>
      <h1>Empresas</h1>
      <h2>Empresas cadastradas <span id="count-emp" class="count-badge">0</span></h2>
    </div>
    <button class="btn-add" id="btn-add-empresa">+ Nova Empresa</button>
  </div>
  <div class="cards-grid" id="grid-empresas"></div>
</div>

<div class="page" id="page-perfil-empresa">
  <div class="page-header">
    <div>
      <h1>Perfil da Empresa</h1>
      <h2>Candidatos anônimos & gráfico de competências</h2>
    </div>
  </div>
  <div class="empresa-select" id="empresa-chips"></div>
  <div id="perfil-content"></div>
</div>

<div class="modal-overlay" id="modal-candidato">
  <div class="modal">
    <h3>+ Novo Candidato</h3>
    <div class="form-row">
      <div class="form-group"><label>Nome completo</label><input type="text" id="c-nome" placeholder="Ex: João Silva"></div>
      <div class="form-group"><label>Idade</label><input type="number" id="c-idade" placeholder="25" min="16" max="80"></div>
      <div class="form-group"><label>Número</label><input type="text" id="c-numbero" placeholder="(99) 99999-9999"></div>
      <div class="form-group"><label>LinkedIn</label><input type="text" id="c-linkedin" placeholder="https://linkedin.com/in/joaosilva"></div>
      <div class="form-group"><label>Tags</label><input type="text" id="c-tags" placeholder="Back-end, Python, Django"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Email</label><input type="email" id="c-email" placeholder="joao@email.com"></div>
      <div class="form-group"><label>CPF</label><input type="text" id="c-cpf" placeholder="000.000.000-00"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Estado</label><input type="text" id="c-estado" placeholder="SP"></div>
      <div class="form-group"><label>CEP</label><input type="text" id="c-cep" placeholder="00000-000"></div>
    </div>
    <div class="form-group"><label>Sobre você</label><textarea id="c-descricao" placeholder="Descreva sua experiência..."></textarea></div>
    <div class="form-group"><label>Competências (separadas por vírgula)</label><input type="text" id="c-competencias" placeholder="TypeScript, React, Node.js"></div>
    <div class="modal-footer">
      <button class="btn-cancel" id="btn-cancel-candidato">Cancelar</button>
      <button class="btn-save" id="btn-save-candidato">Salvar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-empresa">
  <div class="modal">
    <h3>+ Nova Empresa</h3>
    <div class="form-row">
      <div class="form-group"><label>Nome da empresa</label><input type="text" id="e-nome" placeholder="Ex: TechBrasil"></div>
      <div class="form-group"><label>Tags</label><input type="text" id="e-tags" placeholder="Tecnologia, Software, Desenvolvimento"></div>
      <div class="form-group"><label>CNPJ</label><input type="text" id="e-cnpj" placeholder="00.000.000/0001-00"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Email</label><input type="email" id="e-email" placeholder="rh@empresa.com"></div>
      <div class="form-group"><label>País</label><input type="text" id="e-pais" placeholder="Brasil"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Estado</label><input type="text" id="e-estado" placeholder="SP"></div>
      <div class="form-group"><label>CEP</label><input type="text" id="e-cep" placeholder="00000-000"></div>
    </div>
    <div class="form-group"><label>O que buscamos</label><textarea id="e-descricao" placeholder="Descreva o perfil buscado..."></textarea></div>
    <div class="form-group"><label>Skills desejadas (separadas por vírgula)</label><input type="text" id="e-competencias" placeholder="TypeScript, Python, Docker"></div>
    <div class="modal-footer">
      <button class="btn-cancel" id="btn-cancel-empresa">Cancelar</button>
      <button class="btn-save" id="btn-save-empresa">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
